<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criando Conta</title>
</head>

<style>
    *{
        margin: 0px;
        padding: 0px;
        font-family: Arial, Helvetica, sans-serif;
        
    }

    body{

    }

    main{
        display: flex;
        flex-flow: column nowrap;
        justify-content: center;
        align-items: center;
       height: 100vh;
    }

    form > p{
       margin: 15px;
    }

    input{
    border: 2px solid #49a09d;
    /*display: block;*/
    width: 250px;
    height: 40px;
    border-radius: 8px;
    }

    button{
    /*display: block;*/
    font-size: 1em;
    width: 100%;
    height: 40px;
    background-color: #49a09d;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    }

    button:hover{
        background-color: #2d6462;
    }

    input.telefone{
        margin-left: 24px;
    }
</style>
<body>
    <main>
        <p>Seja Bem-Vindo</p>
        <form action="">
            <p>
                <label for="inome">Nome:</label>
                <input type="text" name="nome" id="inome">
            </p>
            <p>
                <label for="itel">Tel:</label>
                <input class="telefone" type="tel" name="telefone" id="itel" maxlength="11" required placeholder="+244 ### ### ###">
            </p>
            <p>
                <label for="iemail">E-mail:</label>
                <input type="email" name="email" id="iemail" required>
            </p>
           <button type="submit">Enviar</button>
        </form>
    </main>
</body>
</html>
